<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="KRIMSON TITAN V6 cinematic AI operating system" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="KRIMSON TITAN" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>KRIMSON TITAN V6</title>
  </head>
  <body>
    <div id="root">
      <div class="preload-shell">
        <div class="preload-core">
          <div class="preload-orbit"></div>
          <p>KRIMSON TITAN V6</p>
          <span>initializing cinematic AI core</span>
        </div>
      </div>
    </div>
    <style>
      .preload-shell {
        min-height: 100svh;
        display: grid;
        place-items: center;
        color: white;
        background:
          radial-gradient(circle at 50% 20%, rgba(220, 20, 60, 0.22), transparent 34%),
          #050505;
        font-family: Inter, system-ui, sans-serif;
      }

      .preload-core {
        display: grid;
        gap: 14px;
        place-items: center;
        text-align: center;
      }

      .preload-core p {
        margin: 0;
        font: 800 22px Orbitron, system-ui, sans-serif;
        letter-spacing: 0.22em;
      }

      .preload-core span {
        color: #9ca3af;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .preload-orbit {
        width: 72px;
        height: 72px;
        border: 1px solid rgba(251, 113, 133, 0.35);
        border-top-color: #fb7185;
        border-radius: 999px;
        box-shadow: 0 0 54px rgba(220, 20, 60, 0.45);
        animation: preloadSpin 1s linear infinite;
      }

      @keyframes preloadSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname)
          if (isLocal) {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              registrations.forEach((registration) => registration.unregister())
            })
            return
          }

          navigator.serviceWorker.register('/sw.js').catch(() => undefined)
        })
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
